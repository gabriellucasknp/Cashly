spring.application.name=rest
spring.profiles.active=dev

# ─── H2 (banco em memoria para desenvolvimento local sem Docker) ───────────────
spring.datasource.url=jdbc:h2:mem:cashly_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
server.port=8080

# AI Agent (pode deixar offline em dev; falhas sao ignoradas silenciosamente)
ai.agent.url=http://localhost:8001

# ─── Security / CORS (DEV) ──────────────────────────────────────────────────────
app.security.username=admin
app.security.password=admin
app.cors.allowed-origins=http://localhost:8080,http://localhost:3000
